name: Build Plaud Sync

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Opt JS-based actions into Node.js 24 (silences the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Type-check (svelte-check)
        run: npm run check

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-macos:
    needs: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Build installer
        run: chmod +x build-installer.sh && ./build-installer.sh

      - name: Create zip for distribution
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Plaud Sync.app" "Plaud-Sync-macOS.zip"
          ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: Plaud-Sync-macOS
          path: |
            dist/Plaud Sync.app
            dist/*.dmg
            dist/Plaud-Sync-macOS.zip
            dist/INSTALL.txt
          retention-days: 90

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Build installer
        shell: bash
        run: ./build-installer.sh

      - uses: actions/upload-artifact@v4
        with:
          name: Plaud-Sync-Windows
          path: dist/*
          retention-days: 90
