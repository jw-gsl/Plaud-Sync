name: Release Plaud Sync

# Manually triggered. Builds signed macOS + Windows bundles, generates the
# updater manifest (latest.json), and publishes them to a rolling GitHub
# Release tagged `plaud-sync-latest` — which is the URL the app's updater polls
# (see plugins.updater.endpoints in src-tauri/tauri.conf.json).
#
# Prerequisites (one-time, owner-managed):
#   1. Generate an updater keypair:  npm run tauri signer generate -- -w ~/.tauri/plaud-sync.key
#   2. Put the PUBLIC key in src-tauri/tauri.conf.json -> plugins.updater.pubkey
#   3. Add repo secrets:
#        TAURI_SIGNING_PRIVATE_KEY           (contents of the private key file)
#        TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (its password, or "" if none)
#
# The version shipped comes from src-tauri/tauri.conf.json ("version"); bump it
# before releasing so clients see a newer version.

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify updater signing is configured
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if grep -q "REPLACE_WITH_TAURI_UPDATER_PUBLIC_KEY" src-tauri/tauri.conf.json; then
            echo "::error::plugins.updater.pubkey is still the placeholder. Generate a keypair and put the public key in src-tauri/tauri.conf.json before releasing."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::Secret TAURI_SIGNING_PRIVATE_KEY is not set. Add it (and TAURI_SIGNING_PRIVATE_KEY_PASSWORD) in repo Settings → Secrets."
            exit 1
          fi

      - name: Verify Apple code-signing is configured
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          missing=""
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_BASE64; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing Apple signing secret(s):$missing — see docs/GUIDE-plaud-sync-updater-signing.md (CI signing section) and add them in repo Settings → Secrets."
            exit 1
          fi

  build:
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: true
      # Sequential so the two platforms publish to the same rolling release and
      # tauri-action can merge each platform into the shared latest.json.
      max-parallel: 1
      matrix:
        include:
          - os: macos-15
            args: ""
          # Windows: build only the NSIS installer (not also the MSI) — halves
          # the per-release eSigner signings (app .exe + -setup.exe = 2) and the
          # NSIS bundle is what the auto-updater uses.
          - os: windows-latest
            args: "--bundles nsis"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      # Windows-only: Java + the jsign jar (Authenticode signer with SSL.com
      # eSigner support), used by the bundle signCommand. We download the jar to
      # a known path (JSIGN_JAR) and run it via `java -jar` so it doesn't depend
      # on PATH/shims being refreshed mid-job.
      - name: Set up Java (for jsign)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download jsign
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          curl -fL -o "$RUNNER_TEMP/jsign.jar" https://github.com/ebourg/jsign/releases/download/7.4/jsign-7.4.jar
          echo "JSIGN_JAR=$RUNNER_TEMP/jsign.jar" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Enable updater artifacts for this build
        shell: bash
        run: |
          node -e "const f='src-tauri/tauri.conf.json';const c=require('./'+f);c.bundle.createUpdaterArtifacts=true;require('fs').writeFileSync(f,JSON.stringify(c,null,2)+'\n')"

      # macOS only: rebuild the App Store Connect API key (.p8) from its base64
      # secret onto disk, and expose its path for the notarization step below.
      - name: Prepare App Store Connect API key (macOS notarization)
        if: matrix.os == 'macos-15'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> "$GITHUB_ENV"

      # Pull the notes for the version being shipped out of CHANGELOG.md so the
      # GitHub release body reflects what actually changed (rather than a static
      # blurb). Runs on both runners; they publish identical bodies to the
      # shared rolling release.
      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "Resolved version: $VERSION"
          # Extract the section for this version, then strip leading/trailing
          # blank lines (portable awk — runs on both BSD awk on macOS and gawk).
          NOTES=$(awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { found=1; next }
            /^## \[/ { if (found) exit }
            found { print }
          ' CHANGELOG.md | awk 'NF{last=NR} {line[NR]=$0} END{first=1; while(first<=last && line[first]=="") first++; for(i=first;i<=last;i++) print line[i]}')
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          {
            echo "body<<__NOTES_EOF__"
            printf '%s\n\n' "$NOTES"
            echo "New install: download the \`.dmg\` (macOS) or \`-setup.exe\` (Windows) below."
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build, sign, and publish to the updater release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization. Ignored on the Windows runner.
          # APPLE_API_KEY_PATH is exported by the prepare step above (macOS only).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # Windows code signing via SSL.com eSigner — read by the bundle
          # signCommand (scripts/sign_windows.py). SIGN_ENABLED is "true" only
          # on Windows, so macOS builds (and the unsigned Build workflow) skip.
          SIGN_ENABLED: ${{ matrix.os == 'windows-latest' }}
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
          ESIGNER_COUNT_FILE: ${{ runner.temp }}/esigner_signed.txt
          ESIGNER_DEBUG_LOG: ${{ runner.temp }}/esigner_debug.log
          JSIGN_JAR: ${{ runner.temp }}/jsign.jar
        with:
          args: ${{ matrix.args }}
          tagName: plaud-sync-latest
          releaseName: "Plaud Sync v__VERSION__"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # Report how many files this release signed via eSigner, on the run's
      # summary page. The authoritative remaining balance lives in your SSL.com
      # eSigner dashboard — this just shows what this release consumed.
      # Surfaces the real signing output (Tauri otherwise swallows the sign
      # command's stderr). Secret-redacted by the wrapper.
      - name: eSigner debug log
        if: ${{ always() && matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          f="${{ runner.temp }}/esigner_debug.log"
          echo "----- eSigner debug log -----"
          [ -f "$f" ] && cat "$f" || echo "(no debug log written)"

      - name: eSigner usage summary
        if: ${{ always() && matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          f="${{ runner.temp }}/esigner_signed.txt"
          n=0; [ -f "$f" ] && n=$(grep -c . "$f" || true)
          {
            echo "### 🖋️ eSigner signing usage"
            echo ""
            echo "This release signed **$n file(s)** via SSL.com eSigner cloud signing."
            echo ""
            echo "Counts against your monthly eSigner allowance (Tier 1 = 20/mo · Tier 2 = 100 · Tier 3 = 300 · Tier 4 = 1000)."
            echo "Authoritative remaining balance: your **SSL.com → eSigner dashboard**."
            if [ "$n" -gt 0 ]; then echo ""; echo "Files signed this run:"; sed 's/^/- /' "$f"; fi
          } >> "$GITHUB_STEP_SUMMARY"

  # tauri-action uploads the new bundles and refreshes latest.json, but it does
  # NOT overwrite the title/body of a pre-existing rolling release, and it leaves
  # every prior version's installers attached. This job runs once after both
  # platforms finish to: (1) set the release title + notes to the shipped
  # version (notes taken from CHANGELOG.md), and (2) delete stale assets so the
  # release only shows the current version's files plus latest.json.
  finalize:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update release title/notes and prune old assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(python3 -c "import json;print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "Finalizing rolling release for version $VERSION"

          # Release notes for this version from CHANGELOG.md (same extraction the
          # build job uses for tauri-action's releaseBody).
          NOTES=$(awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { found=1; next }
            /^## \[/ { if (found) exit }
            found { print }
          ' CHANGELOG.md | awk 'NF{last=NR} {line[NR]=$0} END{first=1; while(first<=last && line[first]=="") first++; for(i=first;i<=last;i++) print line[i]}')
          if [ -z "$NOTES" ]; then NOTES="See CHANGELOG.md for details."; fi
          BODY=$(printf '%s\n\n%s\n' "$NOTES" 'New install: download the `.dmg` (macOS) or `-setup.exe` (Windows) below.')

          gh release edit plaud-sync-latest \
            --repo "$GITHUB_REPOSITORY" \
            --title "Plaud Sync v$VERSION" \
            --notes "$BODY"

          # Keep latest.json and this version's files; delete everything else.
          gh release view plaud-sync-latest --repo "$GITHUB_REPOSITORY" \
            --json assets -q '.assets[].name' | while read -r name; do
            case "$name" in
              latest.json) ;;
              *_"${VERSION}"_*) ;;
              *)
                echo "Deleting stale asset: $name"
                gh release delete-asset plaud-sync-latest "$name" \
                  --repo "$GITHUB_REPOSITORY" --yes
                ;;
            esac
          done
